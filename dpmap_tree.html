<script>const GROUPS=[{"id":"principle","name":"Principles","accent":"#FB923C","blurb":"Writing code that survives change — SOLID plus core heuristics."},{"id":"gof","name":"GoF Design Patterns","accent":"#CBD5E1","blurb":"The 23 Gang-of-Four patterns — creational, structural, behavioral."},{"id":"architectural","name":"Architectural","accent":"#2DD4BF","blurb":"How the app is layered — presentation, domain, data."}];
const SUBS=[{"id":"solid","group":"principle","name":"SOLID","accent":"#FB923C","blurb":"Five class-level principles."},{"id":"simplicity","group":"principle","name":"Simplicity & clarity","accent":"#FBBF24","blurb":"Keep it lean and obvious."},{"id":"coupling","group":"principle","name":"Coupling & OO design","accent":"#F97316","blurb":"Low coupling, sane object graphs."},{"id":"grasp","group":"principle","name":"GRASP","accent":"#FDBA74","blurb":"Assigning responsibilities (Larman)."},{"id":"creational","group":"gof","name":"Creational","accent":"#4ADE80","blurb":"How objects get made."},{"id":"structural","group":"gof","name":"Structural","accent":"#38BDF8","blurb":"How objects compose."},{"id":"behavioral","group":"gof","name":"Behavioral","accent":"#A78BFA","blurb":"How objects collaborate."},{"id":"presentation","group":"architectural","name":"Presentation","accent":"#2DD4BF","blurb":"UI / view layering."},{"id":"data","group":"architectural","name":"Data & persistence","accent":"#22D3EE","blurb":"Domain ↔ database."},{"id":"composition","group":"architectural","name":"Composition","accent":"#5EEAD4","blurb":"Wiring dependencies."}];
const NODES=[{"id":"srp","fam":"principle","name":"SRP","full":"Single Responsibility","tag":"One class, one reason to change","intent":"A module should have one reason to change — it answers to a single actor or stakeholder.","structure":[["Actor","the stakeholder a module serves"],["Responsibility","one axis of change"],["Boundary","split when two actors collide"]],"use":["Policy, persistence and formatting are tangled in one class","Two teams edit the same file for different reasons"],"avoid":["Splitting into anemic one-method classes with no cohesion"],"pros":["Localized, low-risk change","Smaller, focused tests"],"cons":["Over-splitting scatters related logic","More files to navigate"],"code":"// one class, three actors -> split by reason to change\nclass Payroll {}        // finance\nclass EmployeeRepo {}   // DBA\nclass HoursReport {}    // ops","q":"Does SRP mean one method per class?","a":"No — one reason to change. A class can have many methods if they all serve the same actor.","rel":["ocp","soc","isp","high-cohesion"],"pdf":"./Principles/Solid/srp_deep-dive_en.pdf","sub":"solid","group":"principle"},{"id":"ocp","fam":"principle","name":"OCP","full":"Open / Closed","tag":"Open to extend, closed to modify","intent":"Open for extension, closed for modification — add new behavior by adding code, not editing what already works.","structure":[["Abstraction","stable contract clients depend on"],["Extension","new implementation added, not edited"]],"use":["A switch grows a new branch every feature","Plugin / variation points"],"avoid":["Speculative abstraction before a second variant exists (YAGNI)"],"pros":["New cases can't break old ones","Cleaner diffs and reviews"],"cons":["Indirection","Costly if the abstraction is guessed wrong"],"code":"interface Shape { area(): number }\nclass Circle implements Shape { area(){ /* ... */ } }\n// add Square as a new class — Calculator stays untouched","q":"How do you actually enforce OCP?","a":"Find the axis of change, hide it behind a polymorphic seam (interface/strategy), and depend on the abstraction.","rel":["strategy","dip","lsp","protected-variations"],"pdf":"./Principles/Solid/ocp_deep-dive_en.pdf","sub":"solid","group":"principle"},{"id":"lsp","fam":"principle","name":"LSP","full":"Liskov Substitution","tag":"Subtypes must be substitutable","intent":"A subtype must be usable anywhere its base type is expected, without breaking behavior.","structure":[["Base contract","preconditions, postconditions, invariants"],["Subtype","may not strengthen pre- or weaken post-conditions"]],"use":["Designing inheritance hierarchies","Validating an \"is-a\" claim before subclassing"],"avoid":["Forcing inheritance where behavior really differs — compose instead"],"pros":["Polymorphism stays safe","Fewer instanceof checks"],"cons":["Hard to verify","Violations are subtle (Square/Rectangle)"],"code":"// violation: Square breaks Rectangle's contract\nclass Rectangle { setW(w){} setH(h){} }\nclass Square extends Rectangle {} // setW also changes H -> surprises callers","q":"Give a classic LSP violation.","a":"Square extends Rectangle: setting width independently of height breaks code that assumes Rectangle semantics.","rel":["ocp","isp","coi"],"pdf":"./Principles/Solid/lsp_deep-dive_en.pdf","sub":"solid","group":"principle"},{"id":"isp","fam":"principle","name":"ISP","full":"Interface Segregation","tag":"Many small interfaces beat one fat one","intent":"Clients should not be forced to depend on methods they don't use.","structure":[["Role interface","narrow, client-specific"],["Implementer","composes several role interfaces"]],"use":["A \"god\" interface forces empty or throwing methods","Different clients need different slices"],"avoid":["Shattering into so many interfaces that cohesion is lost"],"pros":["Lower coupling","Implementations stay honest"],"cons":["More types","Risk of over-segmentation"],"code":"// instead of Machine { print; scan; fax }\ninterface Printer { print() }\ninterface Scanner { scan() }\nclass SimplePrinter implements Printer {}","q":"How does ISP relate to SRP?","a":"SRP is about a class's reason to change; ISP applies the same cohesion idea to interfaces, from the client's point of view.","rel":["srp","dip","lsp"],"pdf":"./Principles/Solid/isp_deep-dive_en.pdf","sub":"solid","group":"principle"},{"id":"dip","fam":"principle","name":"DIP","full":"Dependency Inversion","tag":"Depend on abstractions, not concretions","intent":"High-level and low-level modules both depend on abstractions, not on each other; the abstraction doesn't depend on details — details implement it.","structure":[["Port","abstraction owned by the domain layer"],["Adapter","low-level detail implements the port"]],"use":["Keep the domain free of DB/framework imports","Swap implementations, test in isolation"],"avoid":["Trivial code with a single, stable implementation"],"pros":["Testable, swappable","Clean domain core"],"cons":["More wiring","Needs a DI mechanism/container"],"code":"interface OrderRepo { save(o: Order): Promise\u003cvoid> }\nclass OrderService { constructor(private repo: OrderRepo) {} }\n// infra: class SqlOrderRepo implements OrderRepo {}","q":"DIP vs DI?","a":"DIP is the principle (depend on abstractions). DI — constructor injection, containers — is one mechanism that realizes it.","rel":["dependency-injection","repository","ocp"],"pdf":"./Principles/Solid/dip_deep-dive_en.pdf","sub":"solid","group":"principle"},{"id":"dry","fam":"principle","name":"DRY","full":"Don't Repeat Yourself","tag":"One authoritative source of knowledge","intent":"Every piece of knowledge should have a single, unambiguous representation in the system.","structure":[["Knowledge","a rule, decision or fact"],["Single source","one place that owns it"]],"use":["The same business rule is copy-pasted in three places","Magic numbers duplicated everywhere"],"avoid":["Coupling unrelated code that merely looks similar (false DRY)"],"pros":["One place to change","Fewer divergence bugs"],"cons":["The wrong abstraction is worse than duplication","Premature DRY couples"],"code":"if (user.age >= 18) ...   // here\nif (u.age >= 18) ...      // and here\nconst isAdult = u => u.age >= 18   // single source","q":"When is duplication better than DRY?","a":"When the similarity is coincidental. Don't couple two things just because they look alike — prefer duplication over the wrong abstraction.","rel":["soc","kiss","srp"],"pdf":"./Principles/Simplicity_and_Clarity/dry_deep-dive_en.pdf","sub":"simplicity","group":"principle"},{"id":"kiss","fam":"principle","name":"KISS","full":"Keep It Simple","tag":"Prefer the simplest thing that works","intent":"Favor simple, obvious solutions; complexity must earn its place.","structure":[["Simplicity","the fewest moving parts"],["Justification","add complexity only when measured"]],"use":["Choosing between a clever and an obvious solution","Reviewing over-engineered code"],"avoid":["Over-simplifying past real requirements"],"pros":["Readable, maintainable","Faster onboarding"],"cons":["\"Simple\" is subjective","Can hide flexibility you'll need"],"code":"// clever:\nconst isEven = n => !(n & 1)\n// kiss:\nconst isEven = n => n % 2 === 0","q":"Is KISS in tension with design patterns?","a":"Yes — patterns add structure. Apply them when complexity is real, not preemptively; otherwise KISS and YAGNI win.","rel":["yagni","dry","soc"],"pdf":"./Principles/Simplicity_and_Clarity/kiss_deep-dive_en.pdf","sub":"simplicity","group":"principle"},{"id":"yagni","fam":"principle","name":"YAGNI","full":"You Aren't Gonna Need It","tag":"Build it when you actually need it","intent":"Don't add functionality until it is genuinely required.","structure":[["Now","the requirement in front of you"],["Later","speculative needs you defer"]],"use":["Tempted to add \"future-proof\" config or flags","Premature generalization"],"avoid":["Skipping genuinely-known near-term needs or basic extensibility"],"pros":["Less code and maintenance","Faster delivery"],"cons":["Some change is costly to retrofit","Needs judgment"],"code":"// YAGNI: don't build a plugin system for one impl\nclass Notifier { send(msg){ email(msg) } }\n// add the abstraction when the 2nd channel actually arrives","q":"YAGNI vs OCP — don't they conflict?","a":"They balance. Don't pre-abstract (YAGNI); when the second variant appears, refactor toward OCP. The rule of three.","rel":["kiss","ocp","dry"],"pdf":"./Principles/Simplicity_and_Clarity/yagni_deep-dive_en.pdf","sub":"simplicity","group":"principle"},{"id":"lod","fam":"principle","name":"LoD","full":"Law of Demeter","tag":"Only talk to your immediate friends","intent":"An object should only call methods on itself, its fields, its parameters, and objects it creates — not reach through chains.","structure":[["Direct collaborator","one hop is allowed"],["Train wreck","a.b().c().d() couples you to internals"]],"use":["Reducing coupling to a deep object graph","Encapsulating navigation behind intent"],"avoid":["Adding endless delegate methods that bloat the API"],"pros":["Lower coupling","Refactor-friendly"],"cons":["Delegation boilerplate","Fluent APIs legitimately chain"],"code":"// violates LoD:\norder.getCustomer().getAddress().getCity()\n// tell, don't ask:\norder.shipToCity()","q":"Does LoD ban all method chaining?","a":"No. Fluent/builder chains return the same object or type. LoD targets reaching through foreign object graphs.","rel":["coi","soc","srp"],"pdf":"./Principles/Coupling_and_OO_Design/lod_deep-dive_en.pdf","sub":"coupling","group":"principle"},{"id":"coi","fam":"principle","name":"CoI","full":"Composition over Inheritance","tag":"Has-a is more flexible than is-a","intent":"Reuse behavior by composing small objects rather than inheriting from base classes.","structure":[["Component","small, focused collaborator"],["Host","delegates to components at runtime"]],"use":["Behavior varies along multiple axes","Avoiding deep, fragile hierarchies"],"avoid":["A genuine, stable is-a relationship with a shared contract"],"pros":["Runtime flexibility","Avoids the fragile base class"],"cons":["More objects and wiring","Indirection"],"code":"// inheritance explosion -> compose instead\nclass Player { constructor(private move: MoveStrategy) {} }\nnew Player(new FlyMove())","q":"Why \"favor\" composition rather than always use it?","a":"Inheritance still fits a true is-a with a shared contract; composition wins when behavior varies or you'd subclass purely for reuse.","rel":["strategy","decorator","lsp"],"pdf":"./Principles/Coupling_and_OO_Design/coi_deep-dive_en.pdf","sub":"coupling","group":"principle"},{"id":"soc","fam":"principle","name":"SoC","full":"Separation of Concerns","tag":"Different concerns, different modules","intent":"Split a system so each part addresses a distinct concern — UI, domain, persistence.","structure":[["Concern","one dimension of the problem"],["Layer / module","owns exactly that concern"]],"use":["Layered or hexagonal architecture","UI logic leaking into the domain"],"avoid":["Over-layering tiny apps — ceremony without benefit"],"pros":["Independent change and testing","Clear ownership"],"cons":["More indirection","Cross-cutting concerns still leak"],"code":"// controller (HTTP) -> service (domain) -> repo (data)\n@Controller() class OrdersController {\n  constructor(private svc: OrderService){}\n}","q":"SoC vs SRP?","a":"SoC is the architectural-scale version; SRP is the same idea at the class level. One principle, two scales.","rel":["srp","mvc","dip"],"pdf":"./Principles/Coupling_and_OO_Design/soc_deep-dive_en.pdf","sub":"coupling","group":"principle"},{"id":"information-expert","fam":"principle","name":"Information Expert","tag":"Give work to who has the data","intent":"Assign a responsibility to the class that has the information needed to fulfil it.","structure":[["Expert","the class holding the data"],["Responsibility","the task being placed"],["Information","what's needed to do it"]],"use":["Deciding which class gets a method","Behaviour that needs a class's own data"],"avoid":["When it bloats the data-holder or drags in I/O — use Pure Fabrication"],"pros":["Behaviour sits with its data","Encapsulation, low coupling"],"cons":["Can overload one class","May clash with separation of concerns"],"code":"class Order {\n  items: Item[] = []\n  total(){ return this.items.reduce((s,i)=>s+i.subtotal(), 0) }  // Order owns items\n}","q":"Information Expert vs SRP?","a":"Expert decides where a responsibility goes (the data-holder); SRP limits how many reasons a class has to change. They can pull opposite ways — balance with Pure Fabrication.","rel":["high-cohesion","low-coupling","srp"],"pdf":"./Principles/GRASP/information-expert_deep-dive_en.pdf","sub":"grasp","group":"principle"},{"id":"creator","fam":"principle","name":"Creator","tag":"Who instantiates whom","intent":"Let class B create A when B aggregates, contains, records, or closely uses A.","structure":[["Creator","the class that makes the object"],["Created","the new object"],["Criteria","contains / aggregates / uses"]],"use":["Deciding which class calls new","B already holds or closely uses A"],"avoid":["Complex construction — delegate to Factory Method / Builder"],"pros":["Low coupling — no extra creator class","Natural ownership"],"cons":["Poor fit when creation logic is complex"],"code":"class Cart {\n  lines: Line[] = []\n  add(p: Product){ this.lines.push(new Line(p)) }  // Cart contains Lines -> Cart creates them\n}","q":"Creator (GRASP) vs Factory Method (GoF)?","a":"Creator is a principle for deciding who instantiates; Factory Method is a pattern that implements creation via subclassing. Creator often points to where a factory belongs.","rel":["factory-method","information-expert","low-coupling"],"pdf":"./Principles/GRASP/creator_deep-dive_en.pdf","sub":"grasp","group":"principle"},{"id":"controller","fam":"principle","name":"Controller","tag":"First object behind the UI","intent":"Hand a system event to a non-UI object representing the system, a use case, or a root — not the UI widget.","structure":[["Controller","handles a system operation"],["UI","delegates to the controller"],["Domain","coordinated by the controller"]],"use":["Routing input from the UI into the domain","Use-case / session coordination"],"avoid":["A bloated controller doing domain work itself — delegate it"],"pros":["Keeps the UI thin","Domain logic reused across UIs"],"cons":["Risk of a god controller","Over-centralization"],"code":"@Controller('orders')\nclass OrdersController {        // not the UI — delegates inward\n  place(dto){ return this.orders.place(dto) }\n}","q":"GRASP Controller vs MVC Controller?","a":"Same idea, different scope: GRASP names the principle (a non-UI object handles system events); MVC's Controller is one concrete realization of it.","rel":["mvc","pure-fabrication","low-coupling"],"pdf":"./Principles/GRASP/controller_deep-dive_en.pdf","sub":"grasp","group":"principle"},{"id":"low-coupling","fam":"principle","name":"Low Coupling","tag":"Minimize dependencies","intent":"Assign responsibilities so dependencies between classes stay few and weak.","structure":[["Coupling","how strongly a class leans on others"],["Goal","limit the ripple of change"],["Means","interfaces, indirection"]],"use":["Evaluating a design option","Choosing where a method should live"],"avoid":["Chasing zero coupling — some is necessary; don't over-indirect"],"pros":["Localized change","Reuse and testability"],"cons":["Over-decoupling adds indirection and ceremony"],"code":"// coupled: new SqlOrderRepo() inside the service\n// low coupling: depend on an interface, inject it\nclass OrderService { constructor(private repo: OrderRepo){} }","q":"Low Coupling vs DIP?","a":"Low Coupling is the goal (few, weak dependencies); DIP is one technique to reach it (depend on abstractions). DIP is the how, Low Coupling the why.","rel":["dip","lod","high-cohesion"],"pdf":"./Principles/GRASP/low-coupling_deep-dive_en.pdf","sub":"grasp","group":"principle"},{"id":"high-cohesion","fam":"principle","name":"High Cohesion","tag":"Keep related work together","intent":"Assign responsibilities so each class keeps a focused, strongly related set.","structure":[["Cohesion","how related a class's duties are"],["Goal","focused, understandable classes"],["Means","split unrelated work out"]],"use":["A class doing many unrelated things","Balanced against Low Coupling"],"avoid":["Splitting so far you get scattered, anemic classes"],"pros":["Readable, testable, maintainable","Easier reuse"],"cons":["Over-splitting raises coupling and coordination"],"code":"// low cohesion: Order computes tax, renders PDF, sends email\n// high cohesion: Order · TaxCalc · PayslipPdf · Mailer","q":"High Cohesion vs SRP?","a":"Nearly the same lens: SRP says \"one reason to change\"; High Cohesion says \"how related are the duties\". SRP is the SOLID phrasing of cohesion.","rel":["srp","low-coupling","soc"],"pdf":"./Principles/GRASP/high-cohesion_deep-dive_en.pdf","sub":"grasp","group":"principle"},{"id":"polymorphism","fam":"principle","name":"Polymorphism","tag":"Vary by type, not by if/else","intent":"When behaviour varies by type, assign it through polymorphic operations rather than conditionals on type.","structure":[["Interface","the common operation"],["Variants","type-specific implementations"],["Client","calls without type checks"]],"use":["switch / if ladders on a type field","Pluggable variation by subtype"],"avoid":["A single, stable behaviour — polymorphism is needless"],"pros":["Open to new types (OCP)","Removes conditionals"],"cons":["More classes","Indirection if overused"],"code":"interface Shape { area(): number }\n// instead of switch(shape.kind) — each type implements area()","q":"Polymorphism (GRASP) vs Strategy (GoF)?","a":"GRASP Polymorphism is the principle (replace type checks with subtype dispatch); Strategy and State are patterns that apply it to swap algorithms or states.","rel":["ocp","lsp","strategy"],"pdf":"./Principles/GRASP/polymorphism_deep-dive_en.pdf","sub":"grasp","group":"principle"},{"id":"pure-fabrication","fam":"principle","name":"Pure Fabrication","tag":"Invent a class to keep design clean","intent":"Assign a cohesive responsibility to an artificial class (not a domain concept) to protect High Cohesion and Low Coupling.","structure":[["Fabrication","a made-up, non-domain class"],["Reason","keep the domain cohesive & decoupled"],["Examples","Service · Repository · Mapper"]],"use":["Persistence / mapping / coordination off a domain entity","Expert would bloat the data-holder"],"avoid":["Inventing classes with no clear responsibility"],"pros":["Keeps the domain clean","Reusable, cohesive helpers"],"cons":["Too many fabrications fragment the design"],"code":"// don't put SQL on the Order entity:\nclass OrderRepository { save(o: Order){ /* persistence */ } }  // pure fabrication","q":"When does Pure Fabrication beat Information Expert?","a":"When Expert would force unrelated duties (e.g. DB I/O) onto a domain class and wreck cohesion — fabricate a Service / Repository instead.","rel":["information-expert","repository","high-cohesion"],"pdf":"./Principles/GRASP/pure-fabrication_deep-dive_en.pdf","sub":"grasp","group":"principle"},{"id":"indirection","fam":"principle","name":"Indirection","tag":"Add a middleman to decouple","intent":"Assign responsibility to an intermediate object so two components stay decoupled from each other.","structure":[["Intermediary","the mediating object"],["Parties","components kept apart"],["Effect","lower direct coupling"]],"use":["Two components shouldn't know each other","Insert a seam — adapter, mediator, controller"],"avoid":["Layers of indirection \"just in case\" — hurts clarity"],"pros":["Low coupling","Swappable, interceptable"],"cons":["More moving parts","Harder to trace"],"code":"// A and B never talk directly:\nclass Mediator { notify(sender, event){ /* route it */ } }","q":"Indirection vs Protected Variations?","a":"Indirection adds a middleman to decouple; Protected Variations wraps a variation point behind a stable interface. Indirection is a common way to achieve PV.","rel":["mediator","facade","dip"],"pdf":"./Principles/GRASP/indirection_deep-dive_en.pdf","sub":"grasp","group":"principle"},{"id":"protected-variations","fam":"principle","name":"Protected Variations","tag":"Wrap what varies behind a stable interface","intent":"Identify points of predicted variation or instability and wrap them behind a stable interface.","structure":[["Variation point","what is likely to change"],["Stable interface","the contract clients depend on"],["Implementations","swapped behind it"]],"use":["A known / likely change — vendor, format, platform","Shielding clients from churn"],"avoid":["Protecting against speculative change — YAGNI; protect predicted variation"],"pros":["Change is contained at the seam","Pluggable, future-proof"],"cons":["Over-protection adds cost","Guessing the wrong seam"],"code":"interface PaymentGateway { pay(cents: number): Promise\u003cvoid> }\n// Stripe / PayPal vary behind it; clients never change","q":"Protected Variations vs OCP?","a":"The same idea from two sources: OCP (SOLID) and Protected Variations (GRASP) both isolate variation behind a stable abstraction. PV is the more general root principle.","rel":["ocp","dip","indirection"],"pdf":"./Principles/GRASP/protected-variations_deep-dive_en.pdf","sub":"grasp","group":"principle"},{"id":"singleton","fam":"creational","name":"Singleton","tag":"One instance, one front door","intent":"Guarantee a class has exactly one instance per process and a single global access point.","structure":[["private ctor","blocks external new"],["static instance","the one cached object"],["getInstance()","lazily builds, then reuses"]],"use":["One genuinely shared resource (config, connection pool)","A single well-known access point is required"],"avoid":["Most cases — prefer a DI singleton-scoped service"],"pros":["Controlled single access point"],"cons":["Hidden global state","Hard to mock","Init-order and test coupling"],"code":"class Config {\n  static #i?: Config\n  static get(){ return Config.#i ??= new Config() }\n}","q":"Why is Singleton often an anti-pattern?","a":"It's hidden global state — tight coupling, hard to test, unclear lifecycle. Most cases are better served by a DI singleton-scoped service.","rel":["factory-method","dependency-injection","facade"],"pdf":"./GoF_Design_Patterns/Creational/singleton_deep-dive_en.pdf","sub":"creational","group":"gof"},{"id":"factory-method","fam":"creational","name":"Factory Method","tag":"Let subclasses choose the type","intent":"Define an interface for creating an object, but let subclasses decide which class to instantiate.","structure":[["Creator","declares the factory method"],["ConcreteCreator","overrides it to pick the class"],["Product","common interface"],["ConcreteProduct","the object actually created"]],"use":["A class can't anticipate the exact type it must create","Localize object creation behind one overridable method"],"avoid":["Only one product type will ever exist — just use new"],"pros":["Decouples client from concrete classes","OCP for new products"],"cons":["A subclass per product","More indirection"],"code":"abstract class Dialog {\n  abstract createButton(): Button\n  render(){ this.createButton().paint() }\n}\nclass WinDialog extends Dialog { createButton(){ return new WinButton() } }","q":"Factory Method vs Abstract Factory?","a":"Factory Method makes one product via subclassing; Abstract Factory makes families of related products via composition.","rel":["abstract-factory","prototype","ocp"],"pdf":"./GoF_Design_Patterns/Creational/factory-method_deep-dive_en.pdf","sub":"creational","group":"gof"},{"id":"abstract-factory","fam":"creational","name":"Abstract Factory","tag":"Families of related objects","intent":"Provide an interface to create families of related objects without specifying concrete classes.","structure":[["AbstractFactory","one create-method per product"],["ConcreteFactory","one consistent family"],["Products","a related set"]],"use":["UI toolkits and themes","Cross-platform widget sets — swap a whole family at once"],"avoid":["Products aren't actually related or co-varying"],"pros":["Guarantees compatible products","Isolates concrete classes"],"cons":["Adding a new product kind touches every factory"],"code":"interface UIFactory { button(): Button; checkbox(): Checkbox }\nclass MacFactory implements UIFactory {\n  button(){ return new MacButton() }\n  checkbox(){ return new MacCheckbox() }\n}","q":"When does Abstract Factory hurt?","a":"Adding a new product type changes the interface and every concrete factory — open for families, closed against new product kinds.","rel":["factory-method","builder","singleton"],"pdf":"./GoF_Design_Patterns/Creational/abstract-factory_deep-dive_en.pdf","sub":"creational","group":"gof"},{"id":"builder","fam":"creational","name":"Builder","tag":"Construct step by step","intent":"Separate the construction of a complex object from its representation so one process can build different results.","structure":[["Builder","step methods"],["Director","(optional) orders the steps"],["Product","the assembled result"]],"use":["Many optional params / telescoping constructors","Immutable objects with validation"],"avoid":["Simple objects with few fields — overkill"],"pros":["Readable construction","Validates before build()"],"cons":["More boilerplate","A two-phase object"],"code":"const q = new QueryBuilder()\n  .select('id').from('users')\n  .where('age > 18').limit(10).build()","q":"Builder vs Abstract Factory?","a":"Builder constructs one complex object step-by-step (cares how); Abstract Factory returns families immediately (cares what).","rel":["abstract-factory","factory-method","prototype"],"pdf":"./GoF_Design_Patterns/Creational/builder_deep-dive_en.pdf","sub":"creational","group":"gof"},{"id":"prototype","fam":"creational","name":"Prototype","tag":"Create by cloning","intent":"Create new objects by copying an existing instance (the prototype) instead of constructing from scratch.","structure":[["Prototype","declares clone()"],["ConcretePrototype","implements the copy"],["Client","clones instead of new"]],"use":["Object creation is expensive","Many near-identical configured instances"],"avoid":["Objects are cheap to build","Deep graphs with cycles are painful to copy"],"pros":["Skips costly initialization","Runtime-configurable instances"],"cons":["Deep vs shallow copy hazards","Cloning complex graphs"],"code":"class Doc {\n  constructor(public body = '', public tags = ['draft']) {}\n  clone(){ return new Doc(this.body, [...this.tags]) }  // copies itself\n}\nconst copy = new Doc().clone()   // independent of the original","q":"Shallow vs deep clone trap?","a":"A shallow clone shares nested references — mutating the copy mutates the original. Use deep copy (structuredClone) for nested state.","rel":["factory-method","abstract-factory","flyweight"],"pdf":"./GoF_Design_Patterns/Creational/prototype_deep-dive_en.pdf","sub":"creational","group":"gof"},{"id":"adapter","fam":"structural","name":"Adapter","tag":"Make incompatible interfaces fit","intent":"Convert a class's interface into another interface that clients expect.","structure":[["Target","interface the client wants"],["Adaptee","existing incompatible class"],["Adapter","translates between them"]],"use":["Integrate a third-party or legacy API","Two interfaces almost match"],"avoid":["You control both sides — fix the interface instead"],"pros":["Reuse without modifying either side"],"cons":["An extra layer","Can mask a deeper model mismatch"],"code":"class StripeAdapter implements PaymentGateway {\n  constructor(private s: Stripe) {}\n  pay(cents:number){ return this.s.charge(cents) }\n}","q":"Adapter vs Facade?","a":"Adapter changes one interface to a specific expected one; Facade invents a new, simpler interface over a whole subsystem.","rel":["facade","decorator","proxy"],"pdf":"./GoF_Design_Patterns/Structural/adapter_deep-dive_en.pdf","sub":"structural","group":"gof"},{"id":"bridge","fam":"structural","name":"Bridge","tag":"Split abstraction from implementation","intent":"Decouple an abstraction from its implementation so the two can vary independently.","structure":[["Abstraction","high-level control, holds an Implementor"],["Implementor","platform / detail interface"],["Refined / Concrete","vary on each side"]],"use":["Two independent dimensions (shape x renderer)","Avoid a class explosion of m x n"],"avoid":["Only one dimension varies — YAGNI"],"pros":["m + n classes instead of m x n","Swap implementation at runtime"],"cons":["Upfront indirection","Harder to grasp"],"code":"class Shape { constructor(protected r: Renderer){} }\nclass Circle extends Shape { draw(){ this.r.drawCircle() } }\n// Renderer: SvgRenderer | CanvasRenderer","q":"Bridge vs Strategy — both compose an interface?","a":"Structurally similar. Bridge is structural (separate two hierarchies that vary); Strategy is behavioral (swap an algorithm). Intent differs.","rel":["strategy","adapter","abstract-factory"],"pdf":"./GoF_Design_Patterns/Structural/bridge_deep-dive_en.pdf","sub":"structural","group":"gof"},{"id":"composite","fam":"structural","name":"Composite","tag":"Treat tree and leaf alike","intent":"Compose objects into tree structures and let clients treat individual objects and compositions uniformly.","structure":[["Component","common interface"],["Leaf","no children"],["Composite","holds children, delegates"]],"use":["Part-whole hierarchies (files/folders, UI trees, menus)"],"avoid":["Flat, non-hierarchical data"],"pros":["Uniform client code","Recursion is natural"],"cons":["Type safety is loosened","Can over-generalize leaves"],"code":"interface Node { size(): number }\nclass File implements Node { size(){ return this.bytes } }\nclass Dir implements Node { size(){ return sum(this.kids.map(k=>k.size())) } }","q":"Composite's main trade-off?","a":"Uniformity vs type safety — a shared interface can expose child-only ops (add/remove) on leaves. You choose transparency vs safety.","rel":["decorator","iterator","visitor"],"pdf":"./GoF_Design_Patterns/Structural/composite_deep-dive_en.pdf","sub":"structural","group":"gof"},{"id":"decorator","fam":"structural","name":"Decorator","tag":"Add behavior by wrapping","intent":"Attach responsibilities to an object dynamically by wrapping it in objects of the same interface.","structure":[["Component","shared interface"],["ConcreteComponent","the base object"],["Decorator","wraps and adds behavior"]],"use":["Optional features combined at runtime","Avoid a subclass explosion from feature combos"],"avoid":["Deep wrapper stacks become hard to trace; order-sensitive"],"pros":["Composition over inheritance","Mix features freely"],"cons":["Many small objects","Wrapping order matters"],"code":"const svc = new RetryDecorator(\n  new CacheDecorator(new HttpService())\n)","q":"Decorator vs Proxy vs Adapter?","a":"Same wrapping shape, different intent: Decorator adds behavior, Proxy controls access, Adapter changes the interface.","rel":["proxy","adapter","composite"],"pdf":"./GoF_Design_Patterns/Structural/decorator_deep-dive_en.pdf","sub":"structural","group":"gof"},{"id":"facade","fam":"structural","name":"Facade","tag":"One simple door to a subsystem","intent":"Provide a unified, simplified interface to a set of interfaces in a subsystem.","structure":[["Facade","simple entry point"],["Subsystem","many complex classes behind it"]],"use":["Tame a complex library","Provide a coarse API for common tasks"],"avoid":["Hiding so much it becomes a god object"],"pros":["Reduces coupling to the subsystem","Easier onboarding"],"cons":["Can become a bottleneck / god class","Hides power-user features"],"code":"class MediaFacade {\n  convert(file){ /* uses Codec, Muxer, IO ... */ }\n}\n// client calls one method, not five classes","q":"Facade vs Adapter?","a":"Facade simplifies a whole subsystem behind a new API; Adapter makes one existing interface match a specific expected one.","rel":["adapter","mediator","proxy"],"pdf":"./GoF_Design_Patterns/Structural/facade_deep-dive_en.pdf","sub":"structural","group":"gof"},{"id":"flyweight","fam":"structural","name":"Flyweight","tag":"Share to save memory","intent":"Use sharing to support huge numbers of fine-grained objects by separating intrinsic (shared) from extrinsic (context) state.","structure":[["Flyweight","intrinsic, shared state"],["FlyweightFactory","caches and returns shared instances"],["Context","supplies extrinsic state"]],"use":["Millions of similar objects (glyphs, tiles, particles)"],"avoid":["Few objects, or state that can't be split cleanly"],"pros":["Big memory savings","Cache reuse"],"cons":["Added complexity","Extrinsic state must be passed in everywhere"],"code":"const cache = new Map() // char -> shared Glyph\nconst glyph = c => cache.get(c)\n  ?? (cache.set(c, new Glyph(c)), cache.get(c))","q":"Intrinsic vs extrinsic state?","a":"Intrinsic is shared and immutable (lives in the flyweight); extrinsic is context-specific (position, color) and passed by the client at use time.","rel":["prototype","proxy","composite"],"pdf":"./GoF_Design_Patterns/Structural/flyweight_deep-dive_en.pdf","sub":"structural","group":"gof"},{"id":"proxy","fam":"structural","name":"Proxy","tag":"A stand-in that controls access","intent":"Provide a surrogate for another object to control access to it.","structure":[["Subject","shared interface"],["RealSubject","the actual object"],["Proxy","mediates access — lazy, remote, protection"]],"use":["Lazy loading","Access control, caching, remote stubs"],"avoid":["No access concern — a plain reference is simpler"],"pros":["Adds control transparently","Lazy and cheap"],"cons":["Indirection / latency","Another layer to reason about"],"code":"class ImageProxy implements Image {\n  private real?: RealImage\n  render(){ (this.real ??= new RealImage(this.path)).render() }\n}","q":"Proxy vs Decorator?","a":"Identical structure. Proxy controls or limits access (often same lifecycle); Decorator augments behavior. Intent separates them.","rel":["decorator","adapter","facade"],"pdf":"./GoF_Design_Patterns/Structural/proxy_deep-dive_en.pdf","sub":"structural","group":"gof"},{"id":"chain","fam":"behavioral","name":"Chain of Responsibility","tag":"Pass the request down a chain","intent":"Pass a request along a chain of handlers; each decides to handle it or forward it.","structure":[["Handler","interface + next link"],["ConcreteHandler","handles or passes on"],["Client","sends to the chain head"]],"use":["Middleware pipelines","Escalation / approval flows; event filtering"],"avoid":["Exactly one known handler — just call it"],"pros":["Decouples sender from receiver","Add or reorder handlers freely"],"cons":["No guarantee the request is handled","Long chains are hard to debug"],"code":"app.use(auth)\napp.use(rateLimit)\napp.use(handler)\n// each middleware: handle(req) or call next()","q":"Where do you use Chain daily?","a":"HTTP middleware (Express, Nest guards/interceptors), logging pipelines, event handlers — all chain-of-responsibility.","rel":["command","decorator","mediator"],"pdf":"./GoF_Design_Patterns/Behavioral/chain_deep-dive_en.pdf","sub":"behavioral","group":"gof"},{"id":"command","fam":"behavioral","name":"Command","tag":"Turn a request into an object","intent":"Encapsulate a request as an object, letting you parameterize, queue, log, and undo operations.","structure":[["Command","execute() / undo()"],["Invoker","triggers commands"],["Receiver","does the real work"]],"use":["Undo/redo","Task queues and jobs; macro recording"],"avoid":["Trivial direct calls — a needless object"],"pros":["Decouples invoker from work","Enables undo, queue, log"],"cons":["Many small command classes","Indirection"],"code":"interface Command { execute(): void; undo(): void }\nclass AddText implements Command { execute(){} undo(){} }\nhistory.push(cmd); cmd.execute()","q":"How does Command enable undo?","a":"Each command stores enough state to reverse itself (undo()); a history stack replays or reverts commands in order.","rel":["chain","memento","strategy"],"pdf":"./GoF_Design_Patterns/Behavioral/command_deep-dive_en.pdf","sub":"behavioral","group":"gof"},{"id":"interpreter","fam":"behavioral","name":"Interpreter","tag":"Evaluate a little language","intent":"Given a language, define a representation for its grammar plus an interpreter to evaluate sentences.","structure":[["AbstractExpression","interpret(ctx)"],["Terminal / NonTerminal","grammar nodes"],["Context","input and state"]],"use":["Small DSLs","Rule engines; query/filter expressions"],"avoid":["Complex grammars — use a real parser / AST tool"],"pros":["Grammar maps directly to classes","Easy to extend rules"],"cons":["A class per rule explodes","Poor performance for big grammars"],"code":"// (age > 18) AND (country = 'UA')\nnew And(new Gt('age',18), new Eq('country','UA'))\n  .interpret(ctx)","q":"When should you NOT use Interpreter?","a":"Anything beyond a tiny grammar — it doesn't scale. Reach for a parser generator or expression library instead.","rel":["composite","visitor","strategy"],"pdf":"./GoF_Design_Patterns/Behavioral/interpreter_deep-dive_en.pdf","sub":"behavioral","group":"gof"},{"id":"iterator","fam":"behavioral","name":"Iterator","tag":"Traverse without exposing internals","intent":"Provide a way to access elements of a collection sequentially without exposing its underlying representation.","structure":[["Iterator","next() / hasNext()"],["Aggregate","creates an iterator"],["Client","loops via the iterator"]],"use":["Custom collections","Uniform traversal; lazy or infinite sequences"],"avoid":["Plain arrays with built-in iteration"],"pros":["Hides the structure","Multiple simultaneous traversals"],"cons":["Overhead for simple cases"],"code":"function* range(a,b){ for(let i=a;i\u003cb;i++) yield i }\nfor (const n of range(0,5)) use(n)","q":"How is Iterator built into JS?","a":"The iteration protocol — Symbol.iterator plus generators (function*) — is Iterator; for...of consumes any iterable.","rel":["composite","visitor","strategy"],"pdf":"./GoF_Design_Patterns/Behavioral/iterator_deep-dive_en.pdf","sub":"behavioral","group":"gof"},{"id":"mediator","fam":"behavioral","name":"Mediator","tag":"Centralize many-to-many talk","intent":"Define an object that encapsulates how a set of objects interact, so they don't refer to each other directly.","structure":[["Mediator","coordinates colleagues"],["Colleague","talks only to the mediator"]],"use":["Complex UI forms","Chat rooms; air-traffic-style coordination"],"avoid":["Few, simple interactions"],"pros":["Reduces n x n coupling to n","Centralizes control"],"cons":["The mediator can become a god object"],"code":"class FormMediator {\n  changed(field){ /* enable/disable others */ }\n}\n// each widget notifies the mediator, not its siblings","q":"Mediator vs Observer?","a":"Observer is one-to-many broadcast; Mediator centralizes many-to-many coordination logic in a single hub.","rel":["observer","facade","command"],"pdf":"./GoF_Design_Patterns/Behavioral/mediator_deep-dive_en.pdf","sub":"behavioral","group":"gof"},{"id":"memento","fam":"behavioral","name":"Memento","tag":"Capture and restore state","intent":"Capture an object's internal state without violating encapsulation, so it can be restored later.","structure":[["Originator","creates and restores mementos"],["Memento","opaque state snapshot"],["Caretaker","holds mementos (history)"]],"use":["Undo/redo","Snapshots, checkpoints, transaction rollback"],"avoid":["Large, expensive state snapshotted frequently"],"pros":["Encapsulation preserved","Clean undo"],"cons":["Memory cost of snapshots","Snapshot-frequency tuning"],"code":"const snap = editor.save()        // -> Memento\neditor.type('...')\neditor.restore(snap)              // undo","q":"Memento vs Command for undo?","a":"Command reverses via inverse operations; Memento restores a whole saved snapshot. They combine — commands can store mementos.","rel":["command","state","prototype"],"pdf":"./GoF_Design_Patterns/Behavioral/memento_deep-dive_en.pdf","sub":"behavioral","group":"gof"},{"id":"observer","fam":"behavioral","name":"Observer","tag":"Notify dependents on change","intent":"Define a one-to-many dependency so that when one object changes state, all its dependents are notified.","structure":[["Subject","registers and notifies observers"],["Observer","update() reacts"],["Subscription","attach / detach"]],"use":["Event systems","Reactive UI / state; model-view sync"],"avoid":["Complex update cascades — prefer an event bus / reactive streams"],"pros":["Loose coupling","Dynamic subscribers"],"cons":["Update storms","Memory leaks if not detached","Order undefined"],"code":"subject.subscribe(o => render(o))\nsubject.notify(state)   // all observers run","q":"Observer vs Pub/Sub?","a":"Observer: the subject holds references to observers directly. Pub/Sub inserts a broker/channel, fully decoupling the two ends.","rel":["mediator","command","mvvm"],"pdf":"./GoF_Design_Patterns/Behavioral/observer_deep-dive_en.pdf","sub":"behavioral","group":"gof"},{"id":"state","fam":"behavioral","name":"State","tag":"Behavior changes with state","intent":"Allow an object to alter its behavior when its internal state changes — it appears to change class.","structure":[["Context","holds the current state"],["State","interface for state-specific behavior"],["ConcreteState","transitions to the next"]],"use":["State machines (order/payment lifecycle)","Mode-dependent behavior"],"avoid":["Few states with trivial branching — an enum/switch is fine"],"pros":["Removes big conditionals","Transitions are explicit"],"cons":["A class per state","Transition logic can scatter"],"code":"class Order {\n  state: OrderState = new Pending()\n  pay(){ this.state = this.state.pay(this) }\n}","q":"State vs Strategy?","a":"Same structure. State objects transition themselves based on context; Strategy is chosen externally by the client and usually doesn't self-switch.","rel":["strategy","command","memento"],"pdf":"./GoF_Design_Patterns/Behavioral/state_deep-dive_en.pdf","sub":"behavioral","group":"gof"},{"id":"strategy","fam":"behavioral","name":"Strategy","tag":"Swap the algorithm at runtime","intent":"Define a family of algorithms, encapsulate each one, and make them interchangeable.","structure":[["Strategy","common algorithm interface"],["ConcreteStrategy","one algorithm"],["Context","delegates to a strategy"]],"use":["Pluggable behavior (sort, pricing, auth, compression)","Replace an if/else ladder"],"avoid":["Behavior never varies — needless indirection"],"pros":["OCP","Test algorithms in isolation","Swap at runtime"],"cons":["Client must know the strategies","More objects"],"code":"class Sorter {\n  constructor(private cmp: Comparator){}\n  run(a){ return a.sort(this.cmp) }\n}\nnew Sorter(byPrice).run(items)","q":"Strategy vs State vs Bridge?","a":"Same shape. Strategy: client picks an algorithm. State: object self-transitions. Bridge: structural split of two hierarchies.","rel":["state","bridge","ocp","polymorphism"],"pdf":"./GoF_Design_Patterns/Behavioral/strategy_deep-dive_en.pdf","sub":"behavioral","group":"gof"},{"id":"template-method","fam":"behavioral","name":"Template Method","tag":"Fixed skeleton, pluggable steps","intent":"Define the skeleton of an algorithm in a base method, deferring some steps to subclasses.","structure":[["AbstractClass","template method + abstract steps"],["ConcreteClass","overrides the steps"]],"use":["Frameworks with a fixed flow + custom hooks","Shared algorithm, varying parts"],"avoid":["Steps vary so much the skeleton is meaningless — prefer Strategy"],"pros":["Reuse the invariant flow","Control the extension points"],"cons":["Inheritance-bound","Fragile base class"],"code":"abstract class Importer {\n  run(){ this.parse(); this.validate(); this.save() }\n  abstract parse(): void\n}","q":"Template Method vs Strategy?","a":"Template Method uses inheritance (override steps); Strategy uses composition (inject behavior). Prefer Strategy when you need a runtime swap.","rel":["strategy","factory-method","coi"],"pdf":"./GoF_Design_Patterns/Behavioral/template-method_deep-dive_en.pdf","sub":"behavioral","group":"gof"},{"id":"visitor","fam":"behavioral","name":"Visitor","tag":"Add operations without touching classes","intent":"Represent an operation on elements of an object structure, letting you add new operations without changing the elements.","structure":[["Visitor","visitX() per element type"],["Element","accept(visitor)"],["ObjectStructure","iterates elements"]],"use":["Operations over a stable AST/tree (type-check, pretty-print, eval)"],"avoid":["Element types change often — Visitor makes that painful"],"pros":["Add operations easily","Group related logic together"],"cons":["A new element type touches every visitor","Double-dispatch overhead"],"code":"class AreaVisitor {\n  visitCircle(c){} visitSquare(s){}\n}\nshape.accept(new AreaVisitor())","q":"Visitor's core trade-off (the expression problem)?","a":"Easy to add operations, hard to add element types — the inverse of OOP polymorphism. Choose by which axis changes more.","rel":["composite","interpreter","iterator"],"pdf":"./GoF_Design_Patterns/Behavioral/visitor_deep-dive_en.pdf","sub":"behavioral","group":"gof"},{"id":"mvc","fam":"architectural","name":"MVC","full":"Model–View–Controller","tag":"Model, View, Controller","intent":"Separate data (Model), presentation (View) and input handling (Controller) so they evolve independently.","structure":[["Model","data + business rules"],["View","renders state"],["Controller","handles input, updates the model"]],"use":["Server-rendered web apps","Classic UI frameworks"],"avoid":["Tiny apps","Fat controllers used as a dumping ground"],"pros":["Separation of concerns","Parallel work across layers"],"cons":["Controller bloat","View–Model coupling creep"],"code":"@Controller('orders') class OrdersController {\n  @Get() list(){ return this.orders.all() }  // -> View renders\n}","q":"MVC vs MVP vs MVVM?","a":"Different view-binding: MVC's controller mediates; MVP's presenter updates a passive view; MVVM binds the view to a view-model (two-way).","rel":["mvp","mvvm","soc","controller"],"pdf":"./Architectural/Presentation/mvc_deep-dive_en.pdf","sub":"presentation","group":"architectural"},{"id":"mvp","fam":"architectural","name":"MVP","full":"Model–View–Presenter","tag":"Presenter drives a passive view","intent":"An MVC variant where a Presenter holds all UI logic and updates a passive View through an interface.","structure":[["View","passive, interface-driven"],["Presenter","UI logic, calls the view"],["Model","domain / data"]],"use":["Testable UI (classic Android, WinForms)","Views that are hard to unit-test"],"avoid":["Simple views where binding (MVVM) is enough"],"pros":["Highly testable presenter","The view is dumb"],"cons":["Presenter can grow large","More interfaces / boilerplate"],"code":"interface LoginView { showError(m:string): void }\nclass LoginPresenter {\n  constructor(private v: LoginView){}\n  submit(){ /* ... */ }\n}","q":"MVP vs MVC?","a":"In MVP the view is fully passive with a 1:1 presenter reference; in MVC the controller handles input and the view may read the model directly.","rel":["mvc","mvvm","dip"],"pdf":"./Architectural/Presentation/mvp_deep-dive_en.pdf","sub":"presentation","group":"architectural"},{"id":"mvvm","fam":"architectural","name":"MVVM","full":"Model–View–ViewModel","tag":"Bind view to a view-model","intent":"Separate view from logic via a ViewModel that exposes bindable state and commands; the view binds (often two-way) to it.","structure":[["View","declarative bindings"],["ViewModel","state + commands, no view reference"],["Model","domain / data"]],"use":["Data-binding frameworks (Angular, Vue, WPF)","Reactive UIs"],"avoid":["Static pages where binding overhead isn't justified"],"pros":["Testable view-model","Less glue code via binding"],"cons":["Binding \"magic\" and debugging","Logic can leak into the view"],"code":"// Angular: component = ViewModel, template binds to signals\ncount = signal(0)\ninc(){ this.count.update(v => v + 1) }","q":"Why does MVVM fit Angular/Vue?","a":"Their reactive binding (signals/refs + templates) gives the ViewModel→View sync the pattern needs; explicit two-way (ngModel / v-model) closes the loop back.","rel":["mvc","observer","soc"],"pdf":"./Architectural/Presentation/mvvm_deep-dive_en.pdf","sub":"presentation","group":"architectural"},{"id":"repository","fam":"architectural","name":"Repository","tag":"Collection-like access to aggregates","intent":"Mediate between the domain and data layers, exposing a collection-like interface for accessing aggregates.","structure":[["Repository","find / add / remove in domain terms"],["Aggregate","the persisted unit"],["Mapper / ORM","behind the port"]],"use":["Keep persistence out of the domain","Swap the DB or fake it in tests"],"avoid":["Thin CRUD apps where a generic repo becomes a leaky abstraction"],"pros":["Clean, testable domain","Centralized query logic"],"cons":["Anemic generic repos","Leaky, ad-hoc query methods"],"code":"interface OrderRepo {\n  byId(id: Id): Promise\u003cOrder>\n  save(o: Order): Promise\u003cvoid>\n}\nclass SqlOrderRepo implements OrderRepo { /* TypeORM */ }","q":"Repository vs DAO?","a":"A DAO is table/row-oriented and close to the DB; a Repository is aggregate/domain-oriented and speaks the ubiquitous language.","rel":["unit-of-work","dip","dependency-injection"],"pdf":"./Architectural/Data_and_persistence/repository_deep-dive_en.pdf","sub":"data","group":"architectural"},{"id":"unit-of-work","fam":"architectural","name":"Unit of Work","tag":"One transaction, one commit","intent":"Track objects changed during a business transaction and coordinate writing them out — and concurrency — in one commit.","structure":[["UnitOfWork","tracks new / dirty / removed"],["commit()","one atomic flush"],["Repositories","enlist their changes"]],"use":["Multiple writes must be atomic","Reduce round-trips and keep consistency"],"avoid":["Single-statement writes","Where the ORM session already does it"],"pros":["Atomicity","Fewer DB round-trips","Consistency"],"cons":["Complexity","Long units risk lock contention"],"code":"await uow.run(async () => {\n  orders.add(order)\n  inventory.decrement(item)\n})  // single transaction commit","q":"Where have you already used Unit of Work?","a":"ORM sessions/transactions — TypeORM's transaction/EntityManager, EF's DbContext, Hibernate's session all implement it.","rel":["repository","command","dip"],"pdf":"./Architectural/Data_and_persistence/unit-of-work_deep-dive_en.pdf","sub":"data","group":"architectural"},{"id":"dependency-injection","fam":"architectural","name":"Dependency Injection","tag":"Inject collaborators from outside","intent":"Supply an object's dependencies from outside — injected at creation, via a setter, or through a container — instead of having it create them itself.","structure":[["Client","declares its dependencies as parameters"],["Injector / Container","wires concrete impls"],["Service","the provided dependency"]],"use":["Realizing DIP","Testability via mocks; swapping implementations or config"],"avoid":["Tiny scripts","Over-configured containers for trivial graphs"],"pros":["Testable, decoupled","Centralized wiring and lifecycles"],"cons":["Indirection","Container \"magic\"","Startup wiring complexity"],"code":"@Injectable() class OrderService {\n  constructor(private repo: OrderRepo){}\n}\n// Nest module wires OrderRepo -> SqlOrderRepo","q":"Is DI the same as a DI container?","a":"No. DI is the technique (pass dependencies in); a container is optional tooling that automates wiring. You can do DI by hand.","rel":["dip","repository","singleton"],"pdf":"./Architectural/Composition/dependency-injection_deep-dive_en.pdf","sub":"composition","group":"architectural"}];
const PATH=[{"stage":"Principles first","why":"Patterns are concrete applications of these rules — learn what you're optimizing for before the patterns themselves.","ids":["kiss","dry","yagni","srp","ocp","lsp","isp","dip","information-expert","creator","controller","low-coupling","high-cohesion","polymorphism","pure-fabrication","indirection","protected-variations","coi","lod","soc"]},{"stage":"Creational","why":"The first patterns tame object creation — separating \"what to make\" from \"who makes it\".","ids":["factory-method","abstract-factory","builder","prototype","singleton"]},{"stage":"Structural","why":"With creation handled, see how objects wrap, adapt and combine into larger shapes.","ids":["adapter","facade","decorator","proxy","composite","bridge","flyweight"]},{"stage":"Behavioral","why":"The largest family: how responsibility is assigned and how objects communicate.","ids":["strategy","state","observer","command","template-method","iterator","chain","mediator","memento","visitor","interpreter"]},{"stage":"Architectural","why":"Zoom out from classes to the whole app — layering, presentation and wiring.","ids":["mvc","mvp","mvvm","repository","unit-of-work","dependency-injection"]}];</script>

  border:1px solid var(--line2);border-radius:9px;padding:8px 13px}

`;

const GRP = {}; GROUPS.forEach(g => GRP[g.id] = g);
const SUB = {}; SUBS.forEach(s => SUB[s.id] = s);
const byId = id => NODES.find(n => n.id === id);
const subsOfGroup = gid => SUBS.filter(s => s.group === gid);
const nodesOfSub = sid => NODES.filter(n => n.sub === sid);
const accentOf = n => SUB[n.sub].accent;
function esc(s){ return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

let onSelect = null;
let current = null;

function detailHTML(n){
  const g = GRP[n.group], s = SUB[n.sub], ac = s.accent, tint = ac + '22';
  const mkRow = (mark, col, t) =>
    `<div class="row"><span class="mk" style="color:${col}">${mark}</span><span>${esc(t)}</span></div>`;
  const list = (label, items, mark, col) => (items && items.length)
    ? `<div class="blk"><div class="lbl">${label}</div>${items.map(t => mkRow(mark, col, t)).join('')}</div>` : '';
  const rel = n.rel.map(id => { const m = byId(id); return m
    ? `<button class="chip" data-go="${m.id}"><span class="dot" style="background:${accentOf(m)}"></span>${esc(m.name)}</button>` : ''
  }).join('');
  return `
    <div class="d-head">
      <span class="pill" style="background:${tint};color:${ac}">${esc(g.name)}</span><span class="subpill">${esc(s.name)}</span>
      <h2>${esc(n.name)}</h2>
      ${n.full ? `<div class="full">${esc(n.full)}</div>` : ''}
      <div class="tag">${esc(n.tag)}</div>
    </div>
    <p class="d-intent">${esc(n.intent)}</p>
    <div class="blk"><div class="lbl">Structure</div>
      ${n.structure.map(x => `<div class="row"><span class="role" style="color:${ac}">${esc(x[0])}</span><span>${esc(x[1])}</span></div>`).join('')}
    </div>
    <div class="cols">
      ${list('Use when', n.use, '✓', '#4ADE80')}
      ${list('Avoid when', n.avoid, '▲', '#FB923C')}
    </div>
    <div class="cols">
      ${list('Pros', n.pros, '+', '#4ADE80')}
      ${list('Cons', n.cons, '–', '#F87171')}
    </div>
    <div class="blk"><div class="lbl">Code sketch</div><div class="codewrap"><button class="copy" type="button">Copy</button><pre class="code">${esc(n.code)}</pre></div></div>
    <div class="qa" style="border-color:${ac}">
      <div class="q">${esc(n.q)}</div><div class="a">${esc(n.a)}</div>
    </div>
    <div class="blk"><div class="lbl">See also</div><div class="chips">${rel}</div></div>
    <div class="dd-row">
      ${n.pdf ? `<a class="dd" href="${encodeURI(n.pdf)}" target="_blank" rel="noopener">Open deep-dive ↗</a>`
              : `<span class="dd-none">Deep-dive poster coming soon</span>`}
    </div>`;
}

function selectNode(id){
  const n = byId(id); if (!n) return;
  current = id;
  const d = document.getElementById('detail');
  if (!d) return;
  d.innerHTML = detailHTML(n);
  d.scrollTop = 0;
  d.querySelectorAll('[data-go]').forEach(b => b.onclick = () => selectNode(b.dataset.go));
  const cb = d.querySelector('.copy');
  if (cb) cb.onclick = () => {
    if (navigator.clipboard) navigator.clipboard.writeText(n.code)
      .then(() => { cb.textContent = 'Copied'; setTimeout(() => cb.textContent = 'Copy', 1200); }).catch(() => {});
  };
  if (decodeURIComponent(location.hash.slice(1)) !== id) {
    try { history.replaceState(null, '', '#' + id); } catch (e) { try { location.hash = id; } catch (e2) {} }
  }
  document.querySelectorAll('[data-id]').forEach(el => {
    const on = el.dataset.id === id;
    el.classList.toggle('active', on);
    if (on) el.setAttribute('aria-current', 'true'); else el.removeAttribute('aria-current');
  });
  if (typeof onSelect === 'function') onSelect(n);
}

// Shareable deep-links: e.g. dpmap_hybrid.html#strategy opens that concept.
function applyHash(){
  const id = decodeURIComponent(location.hash.slice(1));
  if (id && byId(id)){ selectNode(id); return true; }
  return false;
}
window.addEventListener('hashchange', () => {
  const id = decodeURIComponent(location.hash.slice(1));
  if (id && byId(id) && id !== current) selectNode(id);
});

document.head.insertAdjacentHTML('beforeend', '<style>' + STYLE + '</style>');

// Inside the index.html tabs (iframe), the tab bar already shows the brand —
// hide the map's own brand to avoid the duplicate title. Standalone keeps it.
try { if (window.self !== window.top) document.documentElement.classList.add('dpmap-embedded'); }
catch (e) { document.documentElement.classList.add('dpmap-embedded'); }
</script>
<script>// Tree / mind-map prototype: root -> group -> sub-group -> leaf.
// Groups and sub-groups are collapsible; opens collapsed (leaves hidden).
// Pan + zoom, SVG connectors, click a leaf -> shared detail panel.

const TREE_STYLE = `
.treewrap{display:flex;height:calc(100vh - 57px)}
.canvas{position:relative;flex:1;min-width:0;overflow:hidden;cursor:grab;background-color:var(--bg);
  background-image:radial-gradient(rgba(255,255,255,.045) 1px,transparent 1px);background-size:26px 26px}
.canvas.grabbing{cursor:grabbing}
.viewport{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform}
#edges{position:absolute;top:0;left:0;overflow:visible;pointer-events:none}
#nodes{position:absolute;top:0;left:0}
.node{position:absolute;display:flex;align-items:center;border-radius:10px;cursor:pointer;
  user-select:none;font-size:13px;box-sizing:border-box;overflow:hidden}
.node .lbl2{flex:1;line-height:1.16;padding:0 10px}
.node .chev{padding-right:10px;font-size:11px;color:var(--tx3);flex:0 0 auto}
.node .fc{color:var(--tx3);font-size:11px;flex:0 0 auto;padding-right:6px}
.node.root{background:var(--accent);color:#140A03;font-weight:600;justify-content:center;text-align:center}
.node.root .lbl2{flex:0 1 auto;padding:0 12px;text-align:center}
.node.groupnode{background:var(--s2);border:1.5px solid var(--line2);font-weight:600}
.node.subnode{background:rgba(255,255,255,.03);border:1px dashed var(--line2);font-weight:600}
.node.subnode .lbl2{font-size:11px;text-transform:uppercase;letter-spacing:.04em}
.node.leaf{background:var(--surface);border:1px solid var(--line);border-left:3px solid var(--line2);
  color:var(--tx);font-size:12.5px}
.node.leaf:hover{background:var(--s2);border-color:var(--line2)}
.node.active{outline:2px solid var(--accent);outline-offset:1px}
.zoombar{position:absolute;right:14px;bottom:14px;display:flex;gap:6px}
.zbtn{width:34px;height:34px;background:var(--surface);border:1px solid var(--line);border-radius:9px;
  color:var(--tx);cursor:pointer;font-size:17px;line-height:1;display:flex;align-items:center;justify-content:center}
.zbtn:hover{border-color:var(--line2);background:var(--s2)}
.hint{position:absolute;left:14px;bottom:14px;font-size:11px;color:var(--tx3);pointer-events:none}
.treewrap .detail{position:static;width:360px;max-height:none;height:100%;border-radius:0;
  border:none;border-left:1px solid var(--line);overflow:auto}
.placeholder{color:var(--tx3);font-size:14px;line-height:1.6}
.placeholder b{color:var(--tx2);font-weight:600}
@media (max-width:880px){
  .treewrap{flex-direction:column;height:auto}
  .canvas{height:62vh}
  .treewrap .detail{width:auto;border-left:none;border-top:1px solid var(--line)}
}
`;
document.head.insertAdjacentHTML('beforeend', '<style>' + TREE_STYLE + '</style>');

const app = document.getElementById('app');
app.innerHTML = `
  <header class="bar">
    <div class="brand"><span class="logo">◆</span>
      <div><h1>Design Principles &amp; Patterns</h1>
        <div class="sub">Mind-map · click a group or sub-group to expand · click a concept for details</div></div>
    </div>
    <div class="tools"><span class="count">${NODES.length} concepts</span></div>
  </header>
  <div class="treewrap">
    <div class="canvas" id="canvas">
      <div class="viewport" id="viewport">
        <svg id="edges" xmlns="http://www.w3.org/2000/svg"></svg>
        <div id="nodes"></div>
      </div>
      <div class="hint">drag to pan · scroll to zoom</div>
      <div class="zoombar">
        <button class="zbtn" id="zin" aria-label="Zoom in">+</button>
        <button class="zbtn" id="zout" aria-label="Zoom out">−</button>
        <button class="zbtn" id="zfit" aria-label="Fit to view">⤢</button>
      </div>
    </div>
    <aside class="detail" id="detail" aria-live="polite">
      <div class="placeholder"><b>Pick a concept.</b><br>Groups are open; click a sub-group
        (e.g. <b>Creational</b> or <b>SOLID</b>) to reveal its patterns, then click one for the full card.</div>
    </aside>
  </div>`;

const COL = [0, 250, 470, 700];     // x by depth: root, group, sub-group, leaf
const NW  = [200, 184, 170, 182];   // node width by depth
const NH = 40, ROWH = 48;

const canvas = document.getElementById('canvas');
const viewport = document.getElementById('viewport');
const svg = document.getElementById('edges');
const nodesEl = document.getElementById('nodes');

const openGroups = new Set(GROUPS.map(g => g.id));   // groups open
const openSubs = new Set();                          // sub-groups collapsed -> leaves hidden
let bounds = { w: 0, h: 0 };

function layout(){
  const P = {}; let row = 0; const gRows = [];
  for (const g of GROUPS){
    if (!openGroups.has(g.id)){ P['g:' + g.id] = { d: 1, r: row++ }; gRows.push(P['g:' + g.id].r); continue; }
    const subRows = [];
    for (const s of subsOfGroup(g.id)){
      if (openSubs.has(s.id)){
        const start = row;
        for (const lf of nodesOfSub(s.id)){ P[lf.id] = { d: 3, r: row++ }; }
        const sr = (start + row - 1) / 2; P['s:' + s.id] = { d: 2, r: sr }; subRows.push(sr);
      } else { P['s:' + s.id] = { d: 2, r: row++ }; subRows.push(P['s:' + s.id].r); }
    }
    P['g:' + g.id] = { d: 1, r: (subRows[0] + subRows[subRows.length - 1]) / 2 };
    gRows.push(P['g:' + g.id].r);
  }
  P['root'] = { d: 0, r: (gRows[0] + gRows[gRows.length - 1]) / 2 };
  let maxR = 0; for (const k in P) maxR = Math.max(maxR, COL[P[k].d] + NW[P[k].d]);
  bounds = { w: maxR + 24, h: row * ROWH + 24 };
  return P;
}

const cx = p => COL[p.d];
const cyc = p => p.r * ROWH + NH / 2;
function edge(x0, y0, x1, y1, color){
  const dx = Math.max(40, (x1 - x0) / 2);
  return `<path d="M${x0},${y0} C${x0 + dx},${y0} ${x1 - dx},${y1} ${x1},${y1}" fill="none" stroke="${color}" stroke-width="1.5" opacity="0.45"/>`;
}
const node = (p, cls, inner, extra = '', attrs = '') =>
  `<div class="node ${cls}" ${attrs} style="left:${cx(p)}px;top:${p.r * ROWH}px;width:${NW[p.d]}px;height:${NH}px;${extra}">${inner}</div>`;

function render(){
  const P = layout();
  svg.setAttribute('width', bounds.w); svg.setAttribute('height', bounds.h);
  const rp = P['root'];

  let e = '';
  for (const g of GROUPS){
    const gp = P['g:' + g.id];
    e += edge(cx(rp) + NW[0], cyc(rp), cx(gp), cyc(gp), g.accent);
    if (!openGroups.has(g.id)) continue;
    for (const s of subsOfGroup(g.id)){
      const sp = P['s:' + s.id];
      e += edge(cx(gp) + NW[1], cyc(gp), cx(sp), cyc(sp), s.accent);
      if (!openSubs.has(s.id)) continue;
      for (const lf of nodesOfSub(s.id)){ const lp = P[lf.id]; e += edge(cx(sp) + NW[2], cyc(sp), cx(lp), cyc(lp), s.accent); }
    }
  }
  svg.innerHTML = e;

  let h = node(rp, 'root', `<span class="lbl2">Design Principles &amp; Patterns</span>`);
  for (const g of GROUPS){
    const gp = P['g:' + g.id], gOpen = openGroups.has(g.id), gn = NODES.filter(n => n.group === g.id).length;
    h += node(gp, 'groupnode',
      `<span class="lbl2" style="color:${g.accent}">${esc(g.name)}</span><span class="fc">${gn}</span><span class="chev">${gOpen ? '▾' : '▸'}</span>`,
      `border-color:${g.accent}`, `data-grp="${g.id}"`);
    if (!gOpen) continue;
    for (const s of subsOfGroup(g.id)){
      const sp = P['s:' + s.id], sOpen = openSubs.has(s.id), sn = nodesOfSub(s.id).length;
      h += node(sp, 'subnode',
        `<span class="lbl2" style="color:${s.accent}">${esc(s.name)}</span><span class="fc">${sn}</span><span class="chev">${sOpen ? '▾' : '▸'}</span>`,
        `border-color:${s.accent}88`, `data-sub="${s.id}"`);
      if (!sOpen) continue;
      for (const lf of nodesOfSub(s.id)){
        h += node(P[lf.id], 'leaf', `<span class="lbl2">${esc(lf.name)}</span>`, `border-left-color:${s.accent}`, `data-id="${lf.id}"`);
      }
    }
  }
  nodesEl.innerHTML = h;

  nodesEl.querySelectorAll('.node').forEach(el => el.addEventListener('pointerdown', ev => ev.stopPropagation()));
  nodesEl.querySelectorAll('.groupnode').forEach(el => el.onclick = () => {
    const id = el.dataset.grp; openGroups.has(id) ? openGroups.delete(id) : openGroups.add(id); render();
  });
  nodesEl.querySelectorAll('.subnode').forEach(el => el.onclick = () => {
    const id = el.dataset.sub; openSubs.has(id) ? openSubs.delete(id) : openSubs.add(id); render();
  });
  nodesEl.querySelectorAll('.leaf').forEach(el => el.onclick = () => selectNode(el.dataset.id));
  if (current){ const a = nodesEl.querySelector(`.leaf[data-id="${current}"]`); if (a) a.classList.add('active'); }
}

// ---- pan + zoom ----
let view = { x: 36, y: 16, s: 1 };
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const apply = () => viewport.style.transform = `translate(${view.x}px,${view.y}px) scale(${view.s})`;

let drag = null;
canvas.addEventListener('pointerdown', e => { drag = { x: e.clientX, y: e.clientY, vx: view.x, vy: view.y }; canvas.classList.add('grabbing'); });
window.addEventListener('pointermove', e => { if (!drag) return; view.x = drag.vx + (e.clientX - drag.x); view.y = drag.vy + (e.clientY - drag.y); apply(); });
window.addEventListener('pointerup', () => { drag = null; canvas.classList.remove('grabbing'); });
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const r = canvas.getBoundingClientRect(), mx = e.clientX - r.left, my = e.clientY - r.top;
  const ns = clamp(view.s * (e.deltaY < 0 ? 1.12 : 1 / 1.12), 0.35, 2.2);
  const wx = (mx - view.x) / view.s, wy = (my - view.y) / view.s;
  view.s = ns; view.x = mx - wx * ns; view.y = my - wy * ns; apply();
}, { passive: false });

function fit(){
  const r = canvas.getBoundingClientRect();
  const s = clamp(Math.min((r.width - 64) / bounds.w, (r.height - 64) / bounds.h), 0.4, 1.2);
  view.s = s;
  view.x = Math.max(24, (r.width - bounds.w * s) / 2);
  view.y = Math.max(16, (r.height - bounds.h * s) / 2);
  apply();
}
document.getElementById('zin').onclick = () => { view.s = clamp(view.s * 1.15, 0.35, 2.2); apply(); };
document.getElementById('zout').onclick = () => { view.s = clamp(view.s / 1.15, 0.35, 2.2); apply(); };
document.getElementById('zfit').onclick = fit;

// reveal a node selected via See-also chips (open its group + sub-group)
onSelect = (n) => {
  let changed = false;
  if (!openGroups.has(n.group)){ openGroups.add(n.group); changed = true; }
  if (!openSubs.has(n.sub)){ openSubs.add(n.sub); changed = true; }
  if (changed) render();
};

render();
fit();
applyHash();   // open a concept if the URL has a #hash
</script>
</body>
